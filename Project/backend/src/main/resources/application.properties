spring.application.name=backend
# DB 연결
spring.datasource.url=jdbc:mysql://localhost:3306/roomie_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=aki
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정 (스키마 변경은 자동 반영하지 않음 - 테이블 수정은 직접 MySQL로 진행)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 서버 포트 (기본 8080, 원하면 변경 가능)
server.port=8080

# 프로필 이미지 업로드
file.upload-dir=uploads/profile
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT (운영 배포 전에 반드시 환경변수 등으로 교체)
jwt.secret=roomie-dev-secret-key-please-replace-in-production-32bytes+
jwt.expiration-ms=86400000